<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f4f6f9;
        }

        .recipe-card{
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }

        .recipe-header{
            background: linear-gradient(135deg, #ff6b6b, #ff9f43);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .form-control{
            border-radius: 10px;
        }

        .btn-submit{
            background: linear-gradient(135deg, #ff6b6b, #ff9f43);
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
        }

        .btn-submit:hover{
            opacity: 0.9;
        }

        .required{
            color: red;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="card recipe-card shadow-lg col-md-7 mx-auto">

        <div class="recipe-header">
            <h2>🍲 Update Recipe</h2>
            <p class="mb-0">Share your favorite recipe with everyone</p>
        </div>

        <div class="card-body p-4">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Recipe Name <span class="required">*</span>
                    </label>
                    <input
                        type="text"
                        class="form-control"
                        value = "{{ recipe.recipe_name }}"
                        name="recipe_name"
                        placeholder="Enter recipe name">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Recipe Description <span class="required">*</span>
                    </label>
                    <textarea
                        class="form-control"
                        name="recipe_description"
                        value = ""
                        required = "{{ recipe.recipe_description}}"
                        rows="5"
                        placeholder="Write recipe details, ingredients and cooking instructions..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Recipe Image
                    </label>
                    <input
                        type="file"
                        class="form-control"
                        name="recipe_image"
                        value = "{{ recipe.recipe_image }}">
                </div>

                <button type="update" class="btn btn-submit w-100 text-white">
                    Update Recipe
                </button>

            </form>
            <dr></dr>
            
    </div>

</div>

</body>
</html>
